# Conda environment for Epilect external tools, pinned to the versions
# validated in the manuscript (Table S7) / envs/tooling_inventory.md.
#
#   conda env create -f environment.yml
#   conda activate epilect
#   pip install -e .
#
# Note: Dorado (2.0.0) is a standalone GPU basecaller installed separately and
# is OUT OF SCOPE for this package (upstream of the modBAM input). modkit 0.6.4
# is a standalone binary; bioconda also ships it (pinned below).
name: epilect
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  # external bioinformatics tools (Table S7)
  - modkit=0.6.4          # per-read modified-base extraction / pileup
  - samtools=1.23.1       # BAM manipulation
  - bcftools=1.23.1       # VCF set operations / view
  - whatshap=2.8          # SNP read-backed + polyploid phasing
  - flye=2.9.6            # per-strain assembly (nanomotif validation)
  - nanomotif=1.1.2       # de novo methylation motif discovery
  - minimap2=2.30         # long-read alignment
  # python analysis stack (also installed via pip extras; pinned for repro)
  - numpy>=1.21
  - pysam>=0.20
  - matplotlib>=3.5
  - pillow>=9.0
  - pip
  - pip:
      - -e .
